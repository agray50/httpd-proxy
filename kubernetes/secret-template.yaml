# =============================================================================
# Secret Templates for httpd mTLS Proxy
#
# DO NOT commit real certificates to source control.
# Use the commands below to create secrets from actual certificate files,
# or integrate with cert-manager / Vault / OpenShift Secrets Management.
#
# Secrets in this file:
#   httpd-server-tls      - (required) server cert/key presented to clients
#   httpd-client-ca       - (required) CA bundle for verifying inbound client certs
#   httpd-backend-ca      - (TLS to backend) CA bundle for verifying the backend server cert
#   httpd-proxy-client-tls - (mTLS to backend, optional) cert/key httpd presents to backend
#
# Quick start (self-signed, for testing only):
#
#   # 1. Generate a CA key and self-signed CA cert
#   openssl genrsa -out ca.key 4096
#   openssl req -x509 -new -nodes -key ca.key -sha256 -days 3650 \
#     -subj "/CN=mTLS Proxy CA/O=Example" -out ca.crt
#
#   # 2. Generate the proxy server key and CSR
#   openssl genrsa -out server.key 2048
#   openssl req -new -key server.key \
#     -subj "/CN=proxy.example.com/O=Example" -out server.csr
#   openssl x509 -req -in server.csr -CA ca.crt -CAkey ca.key \
#     -CAcreateserial -days 365 -sha256 -out server.crt
#
#   # 3. Generate a sample client key/cert (API service or PKI user)
#   openssl genrsa -out client.key 2048
#   openssl req -new -key client.key \
#     -subj "/CN=my-api-service/O=Example" -out client.csr
#   openssl x509 -req -in client.csr -CA ca.crt -CAkey ca.key \
#     -CAcreateserial -days 365 -sha256 -out client.crt
#
#   # 4. Create the Kubernetes secrets
#   kubectl create secret tls httpd-server-tls \
#     --cert=server.crt --key=server.key \
#     -n your-namespace
#
#   kubectl create secret generic httpd-client-ca \
#     --from-file=ca.crt=ca.crt \
#     -n your-namespace
#
# =============================================================================
# TLS TO BACKEND - additional secrets required when enabling SSLProxy* in proxy.conf
#
#   # If the backend CA is different from the client CA, provide it separately.
#   # If both share the same CA you can reuse the same cert file.
#   kubectl create secret generic httpd-backend-ca \
#     --from-file=ca.crt=<backend-ca.crt> \
#     -n your-namespace
#
#   # Optional: generate a client cert for httpd to present to the backend (proxy mTLS).
#   openssl genrsa -out proxy-client.key 2048
#   openssl req -new -key proxy-client.key \
#     -subj "/CN=httpd-proxy/O=Example" -out proxy-client.csr
#   openssl x509 -req -in proxy-client.csr -CA <backend-ca.crt> -CAkey <backend-ca.key> \
#     -CAcreateserial -days 365 -sha256 -out proxy-client.crt
#
#   kubectl create secret tls httpd-proxy-client-tls \
#     --cert=proxy-client.crt --key=proxy-client.key \
#     -n your-namespace
# =============================================================================

---
# Server TLS secret (certificate + private key for httpd's SSLCertificate*)
# Mounted at: /etc/httpd/ssl/server/
apiVersion: v1
kind: Secret
metadata:
  name: httpd-server-tls
  namespace: your-namespace
  labels:
    app: httpd-proxy
type: kubernetes.io/tls
data:
  # Replace with: base64 -w0 server.crt
  tls.crt: <BASE64_ENCODED_SERVER_CERT>
  # Replace with: base64 -w0 server.key
  tls.key: <BASE64_ENCODED_SERVER_KEY>

---
# Client CA secret - the CA (or CA bundle) used to verify client certificates.
# Include all trusted issuing CAs concatenated in PEM format.
# Mounted at: /etc/httpd/ssl/ca/
apiVersion: v1
kind: Secret
metadata:
  name: httpd-client-ca
  namespace: your-namespace
  labels:
    app: httpd-proxy
type: Opaque
data:
  # Replace with: base64 -w0 ca.crt
  # For multiple CAs: cat ca1.crt ca2.crt > ca-bundle.crt && base64 -w0 ca-bundle.crt
  ca.crt: <BASE64_ENCODED_CA_CERT_OR_BUNDLE>

# =============================================================================
# TLS TO BACKEND - uncomment and populate when enabling SSLProxy* in proxy.conf
# Also uncomment the matching volumeMount + volume in deployment.yaml.
# =============================================================================

# ---
# # Backend CA secret - CA (or bundle) that signed the backend's server cert.
# # Mounted at: /etc/httpd/ssl/backend-ca/
# apiVersion: v1
# kind: Secret
# metadata:
#   name: httpd-backend-ca
#   namespace: your-namespace
#   labels:
#     app: httpd-proxy
# type: Opaque
# data:
#   # Replace with: base64 -w0 <backend-ca.crt>
#   ca.crt: <BASE64_ENCODED_BACKEND_CA_CERT_OR_BUNDLE>

# ---
# # Proxy client TLS secret - cert/key httpd presents to the backend (mTLS to backend).
# # Only needed if the backend requires client certificates from the proxy.
# # Mounted at: /etc/httpd/ssl/proxy-client/
# apiVersion: v1
# kind: Secret
# metadata:
#   name: httpd-proxy-client-tls
#   namespace: your-namespace
#   labels:
#     app: httpd-proxy
# type: kubernetes.io/tls
# data:
#   # Replace with: base64 -w0 proxy-client.crt
#   tls.crt: <BASE64_ENCODED_PROXY_CLIENT_CERT>
#   # Replace with: base64 -w0 proxy-client.key
#   tls.key: <BASE64_ENCODED_PROXY_CLIENT_KEY>
