apiVersion: v1
kind: ConfigMap
metadata:
  name: httpd-proxy-config
  namespace: your-namespace
  labels:
    app: httpd-proxy
data:
  proxy.conf: |
    # =============================================================================
    # httpd mTLS Reverse Proxy Configuration
    #
    # Secrets (mounted read-only):
    #   /etc/httpd/ssl/server/tls.crt     - server certificate
    #   /etc/httpd/ssl/server/tls.key     - server private key
    #   /etc/httpd/ssl/ca/ca.crt          - CA bundle for verifying inbound client certs
    #   /etc/httpd/ssl/backend-ca/ca.crt  - (TLS to backend) CA bundle for verifying the backend server cert
    #
    # Environment variables (set in Deployment):
    #   SERVER_NAME            - FQDN matching the server certificate CN/SAN
    #   BACKEND_SERVICE_HOST   - hostname of the backend Kubernetes service
    #   BACKEND_SERVICE_PORT   - port of the backend service
    # =============================================================================

    # ---------------------------------------------------------------------------
    # Global SSL settings (must appear outside any VirtualHost)
    #
    # Listen 8443 is defined here because we removed the default ssl.conf that
    # normally provides it. Using the https protocol hint enables SNI and ALPN.
    # ---------------------------------------------------------------------------
    Listen 0.0.0.0:8443 https

    SSLPassPhraseDialog  builtin
    SSLSessionCache      shmcb:/run/httpd/sslcache(512000)
    SSLSessionCacheTimeout 300

    # ---------------------------------------------------------------------------
    # mTLS VirtualHost
    # ---------------------------------------------------------------------------
    <VirtualHost _default_:8443>
        ServerName ${SERVER_NAME}

        ErrorLog  /proc/self/fd/2
        CustomLog /proc/self/fd/1 combined

        # -----------------------------------------------------------------------
        # TLS configuration
        # -----------------------------------------------------------------------
        SSLEngine on
        SSLProtocol TLSv1.2 TLSv1.3
        SSLCipherSuite ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-AES256-GCM-SHA384:\
    ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES128-GCM-SHA256:!aNULL:!MD5
        SSLHonorCipherOrder on

        SSLCertificateFile    /etc/httpd/ssl/server/tls.crt
        SSLCertificateKeyFile /etc/httpd/ssl/server/tls.key

        # -----------------------------------------------------------------------
        # Mutual TLS - require a valid client certificate from every caller.
        # Both API services (service accounts) and PKI-authenticated users
        # must present a certificate signed by the CA(s) in ca.crt.
        # -----------------------------------------------------------------------
        SSLCACertificateFile /etc/httpd/ssl/ca/ca.crt
        SSLVerifyClient require
        SSLVerifyDepth 10

        SSLOptions +StdEnvVars +ExportCertData

        # -----------------------------------------------------------------------
        # Forward client identity to the backend
        # -----------------------------------------------------------------------
        # Inform the backend that the original client connection was HTTPS
        RequestHeader set X-Forwarded-Proto "https"
        RequestHeader set X-SSL-Client-Verify  "%{SSL_CLIENT_VERIFY}e"   env=SSL_CLIENT_VERIFY
        RequestHeader set X-SSL-Client-S-DN    "%{SSL_CLIENT_S_DN}e"     env=SSL_CLIENT_S_DN
        RequestHeader set X-SSL-Client-I-DN    "%{SSL_CLIENT_I_DN}e"     env=SSL_CLIENT_I_DN
        RequestHeader set X-SSL-Client-Serial  "%{SSL_CLIENT_M_SERIAL}e" env=SSL_CLIENT_M_SERIAL
        # RequestHeader set X-SSL-Client-Cert "%{SSL_CLIENT_CERT}e"      env=SSL_CLIENT_CERT

        # -----------------------------------------------------------------------
        # Reverse proxy to backend service (plain HTTP)
        # -----------------------------------------------------------------------
        ProxyRequests     Off
        ProxyPreserveHost Off

        ProxyPass        / http://${BACKEND_SERVICE_HOST}:${BACKEND_SERVICE_PORT}/
        ProxyPassReverse / http://${BACKEND_SERVICE_HOST}:${BACKEND_SERVICE_PORT}/

        # -------------------------------------------------------------------
        # TO ENABLE TLS TO THE BACKEND - replace the plain HTTP ProxyPass
        # lines above with the block below. See httpd/proxy.conf for the
        # full checklist of supporting changes (new Secret, volumeMount,
        # volume, and Dockerfile mkdir).
        #
        # OPTIONAL: uncomment SSLProxyCertificate* for mTLS to the backend.
        # -------------------------------------------------------------------
        # SSLProxyEngine on
        # SSLProxyProtocol TLSv1.2 TLSv1.3
        # SSLProxyCipherSuite ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-AES256-GCM-SHA384:\
    # ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES128-GCM-SHA256:!aNULL:!MD5
        # SSLProxyCACertificateFile /etc/httpd/ssl/backend-ca/ca.crt
        # SSLProxyVerify        require
        # SSLProxyVerifyDepth   5
        # SSLProxyCheckPeerCN   on
        # SSLProxyCheckPeerName on
        # SSLProxyCertificateFile    /etc/httpd/ssl/proxy-client/tls.crt   # optional mTLS
        # SSLProxyCertificateKeyFile /etc/httpd/ssl/proxy-client/tls.key   # optional mTLS
        # ProxyPass        / https://${BACKEND_SERVICE_HOST}:${BACKEND_SERVICE_PORT}/
        # ProxyPassReverse / https://${BACKEND_SERVICE_HOST}:${BACKEND_SERVICE_PORT}/

        ProxyTimeout 300

        # -----------------------------------------------------------------------
        # Security response headers
        # -----------------------------------------------------------------------
        Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
        Header always set X-Frame-Options        "DENY"
        Header always set X-Content-Type-Options "nosniff"
        Header always set X-XSS-Protection       "1; mode=block"
    </VirtualHost>
