# =============================================================================
# httpd mTLS Reverse Proxy Configuration
#
# This file is deployed via a Kubernetes ConfigMap and mounted at:
#   /etc/httpd/conf.d/proxy.conf
#
# Secrets (mounted read-only):
#   /etc/httpd/ssl/server/tls.crt     - server certificate
#   /etc/httpd/ssl/server/tls.key     - server private key
#   /etc/httpd/ssl/ca/ca.crt          - CA bundle for verifying inbound client certs
#   /etc/httpd/ssl/backend-ca/ca.crt  - CA bundle for verifying the backend's server cert
#
# Environment variables (set in Deployment):
#   SERVER_NAME            - FQDN matching the server certificate CN/SAN
#   BACKEND_SERVICE_HOST   - hostname/ClusterIP of the backend service
#   BACKEND_SERVICE_PORT   - port of the backend service
# =============================================================================

# ---------------------------------------------------------------------------
# Global SSL settings (must appear outside any VirtualHost)
#
# Listen 8443 is defined here because we removed the default ssl.conf that
# normally provides it. Using the https protocol hint enables SNI and ALPN.
# ---------------------------------------------------------------------------
Listen 0.0.0.0:8443 https

SSLPassPhraseDialog  builtin
SSLSessionCache      shmcb:/run/httpd/sslcache(512000)
SSLSessionCacheTimeout 300

# ---------------------------------------------------------------------------
# mTLS VirtualHost - listens on 8443 (non-privileged, required by OpenShift)
# ---------------------------------------------------------------------------
<VirtualHost _default_:8443>
    ServerName ${SERVER_NAME}

    # Log to stdout/stderr so logs are captured by the container runtime
    ErrorLog  /proc/self/fd/2
    CustomLog /proc/self/fd/1 combined

    # -------------------------------------------------------------------------
    # TLS configuration
    # -------------------------------------------------------------------------
    SSLEngine on
    SSLProtocol TLSv1.2 TLSv1.3
    SSLCipherSuite ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-AES256-GCM-SHA384:\
ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES128-GCM-SHA256:!aNULL:!MD5
    SSLHonorCipherOrder on

    # Server certificate and private key (mounted from Secret: httpd-server-tls)
    SSLCertificateFile    /etc/httpd/ssl/server/tls.crt
    SSLCertificateKeyFile /etc/httpd/ssl/server/tls.key

    # -------------------------------------------------------------------------
    # Mutual TLS (mTLS) - client certificate verification
    #
    # Both API service clients and PKI-authenticated users must present a
    # certificate signed by the CA(s) listed in ca.crt.
    #
    # For a multi-issuer PKI, concatenate all trusted CA certs into ca.crt.
    # -------------------------------------------------------------------------
    SSLCACertificateFile /etc/httpd/ssl/ca/ca.crt
    SSLVerifyClient require
    SSLVerifyDepth 10

    # Export client certificate fields as environment variables so they can
    # be forwarded to the backend as HTTP headers
    SSLOptions +StdEnvVars +ExportCertData

    # -------------------------------------------------------------------------
    # Forward client identity headers to the backend service.
    # The backend can use these to make authorization decisions without
    # re-doing TLS verification.
    # -------------------------------------------------------------------------
    # Inform the backend that the original client connection was HTTPS
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-SSL-Client-Verify  "%{SSL_CLIENT_VERIFY}e"   env=SSL_CLIENT_VERIFY
    RequestHeader set X-SSL-Client-S-DN    "%{SSL_CLIENT_S_DN}e"     env=SSL_CLIENT_S_DN
    RequestHeader set X-SSL-Client-I-DN    "%{SSL_CLIENT_I_DN}e"     env=SSL_CLIENT_I_DN
    RequestHeader set X-SSL-Client-Serial  "%{SSL_CLIENT_M_SERIAL}e" env=SSL_CLIENT_M_SERIAL
    # Uncomment to forward the full PEM-encoded client certificate:
    # RequestHeader set X-SSL-Client-Cert "%{SSL_CLIENT_CERT}e"      env=SSL_CLIENT_CERT

    # -------------------------------------------------------------------------
    # Reverse proxy to backend service
    #
    # By default the backend is reached over plain HTTP (TLS is terminated
    # here). To proxy over HTTPS to a TLS-enabled backend, see the commented
    # block below.
    # -------------------------------------------------------------------------
    ProxyRequests     Off
    ProxyPreserveHost Off

    # Plain HTTP backend (default)
    ProxyPass        / http://${BACKEND_SERVICE_HOST}:${BACKEND_SERVICE_PORT}/
    ProxyPassReverse / http://${BACKEND_SERVICE_HOST}:${BACKEND_SERVICE_PORT}/

    # -----------------------------------------------------------------------
    # TO ENABLE TLS TO THE BACKEND - replace the plain HTTP ProxyPass lines
    # above with the block below, then apply the supporting changes listed.
    #
    # 1. proxy.conf (this file) - uncomment the block below and comment out
    #    the plain HTTP ProxyPass/ProxyPassReverse lines above.
    #
    # 2. Deployment env var - change BACKEND_SERVICE_PORT to the backend's
    #    HTTPS port (typically 8443).
    #
    # 3. New Secret - create httpd-backend-ca containing the CA cert (or
    #    bundle) that signed the backend's server certificate:
    #      kubectl create secret generic httpd-backend-ca \
    #        --from-file=ca.crt=<backend-ca.crt> -n <namespace>
    #
    # 4. Deployment volumeMount - add under volumeMounts:
    #      - name: backend-ca
    #        mountPath: /etc/httpd/ssl/backend-ca
    #        readOnly: true
    #
    # 5. Deployment volume - add under volumes:
    #      - name: backend-ca
    #        secret:
    #          secretName: httpd-backend-ca
    #          defaultMode: 0440
    #
    # 6. Dockerfile - add to the mkdir chain:
    #      && mkdir -p /etc/httpd/ssl/backend-ca
    #
    # OPTIONAL: to also present a client cert to the backend (proxy mTLS),
    # uncomment the SSLProxyCertificate* lines and create Secret
    # httpd-proxy-client-tls (type kubernetes.io/tls) mounted at
    # /etc/httpd/ssl/proxy-client/. Add the same volumeMount + volume pattern.
    # -----------------------------------------------------------------------
    # SSLProxyEngine on
    # SSLProxyProtocol TLSv1.2 TLSv1.3
    # SSLProxyCipherSuite ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-AES256-GCM-SHA384:\
# ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES128-GCM-SHA256:!aNULL:!MD5
    # SSLProxyCACertificateFile /etc/httpd/ssl/backend-ca/ca.crt
    # SSLProxyVerify        require
    # SSLProxyVerifyDepth   5
    # SSLProxyCheckPeerCN   on
    # SSLProxyCheckPeerName on
    # SSLProxyCertificateFile    /etc/httpd/ssl/proxy-client/tls.crt   # optional mTLS
    # SSLProxyCertificateKeyFile /etc/httpd/ssl/proxy-client/tls.key   # optional mTLS
    # ProxyPass        / https://${BACKEND_SERVICE_HOST}:${BACKEND_SERVICE_PORT}/
    # ProxyPassReverse / https://${BACKEND_SERVICE_HOST}:${BACKEND_SERVICE_PORT}/

    ProxyTimeout 300

    # -------------------------------------------------------------------------
    # Security response headers
    # -------------------------------------------------------------------------
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
    Header always set X-Frame-Options        "DENY"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-XSS-Protection       "1; mode=block"
</VirtualHost>
